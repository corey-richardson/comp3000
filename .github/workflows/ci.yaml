name: CI Pipeline

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]
    workflow_dispatch:

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4

          - name: Setup Node.js Environment
            uses: actions/setup-node@v4
            with:
                node-version: "20"
                cache: "npm"
                cache-dependency-path: |
                    SourceCode/package-lock.json
                    SourceCode/frontend/package-lock.json
                    SourceCode/backend/package-lock.json
            
          - name: Install JS Dependencies
            run: npm ci
            working-directory: SourceCode

          - name: Run JS/TS / CSS Lint
            run: npm run lint:js && npm run lint:css
            working-directory: SourceCode

          - name: Setup Python Environment
            uses: actions/setup-python@v5
            with:
                python-version: "3.11"
                cache: "pip"

          - name: Install Python Linting Tools
            run: pip install flake8 black isort

          - name: Run Python Lint
            run: npm run lint:python
            working-directory: SourceCode
    
    test-frontend:
        needs: lint
        runs-on: ubuntu-latest
        steps: 
          - uses: actions/checkout@v4

          - uses: actions/setup-node@v4
            with:
                node-version: "20"
                cache: "npm"
                cache-dependency-path: SourceCode/frontend/package-lock.json

          - name: Install Frontend Dependencies
            run: npm ci
            working-directory: SourceCode/frontend
        
          - name: Run Frontend Tests
            run: npm test -- --coverage
            working-directory: SourceCode/frontend

          - name: Upload Frontend Coverage
            if: always() && github.actor != 'nektos/act'
            uses: actions/upload-artifact@v4
            with:
                name: frontend-coverage
                path: SourceCode/frontend/coverage/

    test-backend:
        needs: lint
        runs-on: ubuntu-latest
        steps: 
          - uses: actions/checkout@v4

          - uses: actions/setup-node@v4
            with:
                node-version: "20"
                cache: "npm"
                cache-dependency-path: SourceCode/backend/package-lock.json
 
          - name: Install Dependencies
            run: npm ci
            working-directory: SourceCode/backend
          
          - name: Generate Prisma Client
            run: npx prisma generate --schema prisma/schema.prisma
            working-directory: SourceCode/backend
            env:
              DATABASE_URL: "postgresql://ci:dummy@localhost:83/archery_scorekeeper?schema=public"
            
          - name: Run Backend Tests
            run: npm test -- --coverage
            working-directory: SourceCode/backend
                    
          - name: Upload Backend Coverage
            if: always() && github.actor != 'nektos/act'
            uses: actions/upload-artifact@v4
            with:
                name: backend-coverage
                path: SourceCode/backend/coverage/

    test-python:
        needs: lint
        runs-on: ubuntu-latest
        steps: 
          - uses: actions/checkout@v4
        
          - name: Setup Python
            uses: actions/setup-python@v5
            with:
                python-version: "3.11"

          - name: Install Python Dependencies
            run: pip install -r requirements.txt
            working-directory: SourceCode/archeryutils-service

          - name: Run Python Tests
            run: pytest --junitxml=python-results.xml
            working-directory: SourceCode/archeryutils-service

          - name: Upload python test results
            if: always() && github.actor != 'nektos/act'
            uses: actions/upload-artifact@v4
            with:
                name: python-results
                path: SourceCode/archeryutils-service/python-results.xml

    build:
        needs: [ lint, test-frontend, test-backend, test-python ]
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4

          - name: Build Containers
            run: docker compose build
            working-directory: SourceCode
