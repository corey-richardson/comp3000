name: CD Pipeline

on:
    workflow_run:
        workflows: ["CI Pipeline"]
        types:
          - completed
        branches:
          - main

jobs:
    changes:
        runs-on: ubuntu-latest
        outputs:
            backend: ${{ steps.filter.outputs.backend }}
            frontend: ${{ steps.filter.outputs.frontend }}
            utils: ${{ steps.filter.outputs.utils }}
        steps:

          - uses: actions/checkout@v4
            with:
                fetch-depth: 0

          - name: Set base SHA
            id: base
            run: |
                echo "base=$(git rev-parse HEAD^)" >> $GITHUB_OUTPUT

          - uses: dorny/paths-filter@v3
            id: filter
            with:
                base: ${{ steps.base.outputs.base }}
                ref: ${{ github.event.workflow_run.head_sha }}
                filters: |
                    backend: ['SourceCode/backend/**']
                    frontend: ['SourceCode/frontend/**']
                    utils: ['SourceCode/archeryutils-service/**']

    deploy-backend:
        needs: [changes]
        if: |
            github.event.workflow_run.conclusion == 'success' &&
            needs.changes.outputs.backend == 'true'
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: SourceCode
        
        steps:
          - uses: actions/checkout@v4

          - name: Setup AWS and ECR
            id: aws-setup
            uses: ./.github/actions/aws-setup
            with:
                aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

          - name: Build and Push Backend
            env:
                ECR_REGISTRY: ${{ steps.aws-setup.outputs.ecr-registry }}
                ECR_REPOSITORY: archery-backend
                IMAGE_TAG: latest
            run: |
                docker build --target production -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./backend
                docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
                aws ecs update-service --cluster archery-utils-service --service archery-backend-task-service --force-new-deployment
                aws ecs wait services-stable --cluster archery-utils-service --services archery-backend-task-service

    deploy-frontend:
        needs: [changes]
        if: |
            github.event.workflow_run.conclusion == 'success' &&
            needs.changes.outputs.frontend == 'true'
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: SourceCode
        steps:
          - uses: actions/checkout@v4

          - name: Configure AWS
            uses: aws-actions/configure-aws-credentials@v2
            with:
                aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                aws-region: eu-north-1
        
          - name: Deploy Frontend to S3 Bucket
            run: |
                cd frontend
                npm install && npm run build
                aws s3 sync build/ s3://archery-frontend-live --delete
                aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"


    deploy-utils:
        needs: [changes]
        if: |
            github.event.workflow_run.conclusion == 'success' &&
            needs.changes.outputs.utils == 'true'
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: SourceCode

        steps:
          - uses: actions/checkout@v4

          - name: Setup AWS and ECR
            id: aws-setup
            uses: ./.github/actions/aws-setup
            with:
                aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        
          - name: Build and Push Utils
            env:
                ECR_REGISTRY: ${{ steps.aws-setup.outputs.ecr-registry }}
                ECR_REPOSITORY: archery-utils
                IMAGE_TAG: latest
            run: |
                docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./archeryutils-service
                docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
                aws ecs update-service --cluster archery-utils-service --service archery-utils-task-service --force-new-deployment
                aws ecs wait services-stable --cluster archery-utils-service --services archery-utils-task-service
