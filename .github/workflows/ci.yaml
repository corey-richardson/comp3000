name: CI Pipeline

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]
    workflow_dispatch:

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4

          - name: Setup Node.js Environment
            uses: actions/setup-node@v4
            with:
                node-version: "20"
                cache: "npm"
                cache-dependency-path: SourceCode/package.json
            
          - name: Install JS Dependencies
            run: npm install
            working-directory: SourceCode

          - name: Run JS/TS / CSS Lint
            run: npm run lint:js && npm run lint:css
            working-directory: SourceCode

          - name: Setup Python Environment
            uses: actions/setup-python@v5
            with:
                python-version: "3.11"
                cache: "pip"

          - name: Install Python Linting Tools
            run: pip install flake8 black isort

          - name: Run Python Lint
            run: npm run lint:python
            working-directory: SourceCode
            
    test:
        runs-on: ubuntu-latest
        steps: 
          - uses: actions/checkout@v4
        
          - name: Setup Python
            uses: actions/setup-python@v5
            with:
                python-version: "3.11"

          - name: Install Dependencies
            run: |
                cd SourceCode
                npm install
                npm install --prefix frontend
                npm install --prefix backend
                pip install -r archeryutils-service/requirements.txt
            
          - name: Run Node.js Tests
            run: npm run test:all
            working-directory: SourceCode
          
          - name: Run Python Tests
            if: always() # Run even when Node.js tests fail
            run: pytest archeryutils-service/ --junitxml=python-results.xml
            working-directory: SourceCode
          
          - name: Upload Test Results
            if: always() && github.actor != 'nektos/act' # Running in GitHub Local Actions
            uses: actions/upload-artifact@v4
            with:
              name: test-reports
              path: |
                SourceCode/python-results.xml
                SourceCode/frontend/coverage/

    build:
        needs: [ lint, test ]
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4

          - name: Build Containers
            run: docker compose build
            working-directory: SourceCode
